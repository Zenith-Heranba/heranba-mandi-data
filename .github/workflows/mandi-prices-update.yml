name: Update Mandi Prices

on:
  schedule:
    # 09:00 IST daily = 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:   # lets you also trigger it manually from GitHub's UI

jobs:
  fetch:
    runs-on: self-hosted
    steps:
      - name: Ensure Git is on PATH
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Users\pratik.m\AppData\Local\Programs\Git\cmd"

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest mandi prices
        run: python fetch_mandi_prices.py
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mandi_prices.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update mandi prices $(Get-Date -Format 'yyyy-MM-dd')"
            git push
          }

