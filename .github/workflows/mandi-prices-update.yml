name: Update Mandi Prices

on:
  schedule:
    # 09:00 IST daily = 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:   # lets you also trigger it manually from GitHub's UI

jobs:
  fetch:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Diagnose via Python requests
        shell: pwsh
        run: |
          python -c "
          import requests, os
          key = os.environ['DATA_GOV_API_KEY']
          print('egress IP (python requests):', requests.get('https://api.ipify.org', timeout=15).text)
          headers = {'User-Agent': 'Mozilla/5.0 (compatible; mandi-prices-fetcher/1.0)'}
          r1 = requests.get('https://api.data.gov.in/resource/35985678-0d79-46b4-9ed6-6f13308a1d24', params={'api-key': key, 'format': 'json', 'limit': 3}, headers=headers, timeout=30)
          print('simple request (no date filter) status:', r1.status_code)
          r2 = requests.get('https://api.data.gov.in/resource/35985678-0d79-46b4-9ed6-6f13308a1d24', params={'api-key': key, 'format': 'json', 'limit': 3}, timeout=30)
          print('simple request (no custom UA) status:', r2.status_code)
          "
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}

      - name: Fetch latest mandi prices
        run: python fetch_mandi_prices.py
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mandi_prices.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update mandi prices $(Get-Date -Format 'yyyy-MM-dd')"
            git push
          }

