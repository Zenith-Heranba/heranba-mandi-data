name: Update Mandi Prices

on:
  schedule:
    # 09:00 IST daily = 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:   # lets you also trigger it manually from GitHub's UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest mandi prices
        run: python fetch_mandi_prices.py
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mandi_prices.json
          git diff --staged --quiet || git commit -m "Update mandi prices $(date +'%Y-%m-%d')"
          git push

